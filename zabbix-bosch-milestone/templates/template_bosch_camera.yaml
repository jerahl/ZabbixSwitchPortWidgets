zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7b645fd22e46459f93f5240834c6a88b
      name: Templates/Video Surveillance
  host_groups:
    - uuid: d5ba1abcdbe44eb59824765739393178
      name: 'Video Surveillance'
  templates:
    # =================================================================
    # Master template - holds the two LLD rules + host prototypes
    # =================================================================
    - uuid: 7afe282d420e449ab5945b335c1c2883
      template: 'Bosch Cameras via Milestone XProtect'
      name: 'Bosch Cameras via Milestone XProtect'
      description: |
        Hybrid monitoring for Bosch IP cameras via Milestone XProtect
        Professional+ Management Server, with direct ICMP/HTTP probes to
        the cameras as an independent liveness check.

        Requires the milestone_zbx.py external check helper script on the
        Zabbix server (or proxy).

        Link THIS template to one seed host - that's where the LLD rules
        run. The child templates are linked automatically to discovered
        hosts via the host prototypes.
      vendor:
        name: 'Custom - Stephen'
        version: '1.0.4'
      groups:
        - name: Templates/Video Surveillance
      macros:
        - macro: '{$MILESTONE.HELPER}'
          value: 'milestone_zbx.py'
          description: 'External check script name'

      discovery_rules:
        - uuid: bb62743550c84c399fdea6a1ee1934e5
          name: 'Milestone Recording Servers'
          key: 'milestone.discover.rs'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[discover,recording_servers]'
          delay: 1h
          lifetime: 7d
          description: 'Discovers Milestone Recording Servers and creates them as sub-hosts'
          host_prototypes:
            - uuid: 3063b4b0a5b54417924333faf5b05d5e
              host: 'RS {#RS.NAME}'
              name: 'Milestone RS: {#RS.NAME}'
              group_links:
                - group:
                    name: 'Video Surveillance'
              templates:
                - name: 'Bosch Cameras via Milestone XProtect - RS'
              macros:
                - macro: '{$RS.GUID}'
                  value: '{#RS.GUID}'
                  description: 'GUID of this Recording Server in Milestone'
              tags:
                - tag: milestone_role
                  value: recording_server
                - tag: rs_guid
                  value: '{#RS.GUID}'
                - tag: rs_name
                  value: '{#RS.NAME}'
              custom_interfaces: 'NO'

        - uuid: 0df6fcdeaab240dc9218bbdb7b8b1292
          name: 'Milestone Cameras'
          key: 'milestone.discover.cameras'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[discover,cameras]'
          delay: 1h
          lifetime: 7d
          description: 'Discovers cameras configured in Milestone and creates them as sub-hosts'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#CAM.ENABLED}'
                value: '1'
                formulaid: A
          host_prototypes:
            - uuid: b8fc50dbfa3343768b858ef162bce26b
              host: 'CAM {#CAM.NAME}'
              name: 'Camera: {#CAM.NAME}'
              group_links:
                - group:
                    name: 'Video Surveillance'
              templates:
                - name: 'Bosch Cameras via Milestone XProtect - Camera'
              macros:
                - macro: '{$CAM.GUID}'
                  value: '{#CAM.GUID}'
                  description: 'GUID of this camera in Milestone'
              tags:
                - tag: milestone_role
                  value: camera
                - tag: camera_guid
                  value: '{#CAM.GUID}'
                - tag: camera_name
                  value: '{#CAM.NAME}'
                - tag: rs_name
                  value: '{#RS.NAME}'
              custom_interfaces: 'NO'

    # =================================================================
    # Child template: Recording Server
    # =================================================================
    - uuid: 90069e9f8e9744b08bebc8df9bf495b0
      template: 'Bosch Cameras via Milestone XProtect - RS'
      name: 'Bosch Cameras via Milestone XProtect - RS'
      description: |
        Per Recording Server items. Attached by LLD host prototype.

        The discovered host is expected to have user macro {$RS.GUID}
        populated (the host prototype sets this automatically).
      groups:
        - name: Templates/Video Surveillance
      macros:
        - macro: '{$MILESTONE.HELPER}'
          value: 'milestone_zbx.py'
          description: 'External check script name'
        - macro: '{$RS.GUID}'
          value: ''
          description: 'Populated per-host by LLD'
        - macro: '{$STORAGE.FREE.WARN.PCT}'
          value: '15'
          description: 'Warn if RS primary storage free % falls below this'
        - macro: '{$STORAGE.FREE.HIGH.PCT}'
          value: '5'
          description: 'High severity if RS primary storage free % falls below this'

      valuemaps:
        - uuid: 4521df34febe42f592b8465b91176eb9
          name: 'Service State'
          mappings:
            - value: '0'
              newvalue: 'Stopped'
            - value: '1'
              newvalue: 'Running'
            - value: '-1'
              newvalue: 'Unknown'

      items:
        - uuid: 41f3dad27e804fcda7d67ebca9c02246
          name: 'RS service state'
          key: 'milestone.rs.service'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[rs_service,{$RS.GUID}]'
          value_type: UNSIGNED
          delay: 2m
          history: 90d
          trends: 365d
          description: '1 = running, 0 = stopped, -1 = unknown'
          valuemap:
            name: 'Service State'
          tags:
            - tag: component
              value: recording_server
            - tag: metric
              value: service_state
          triggers:
            - uuid: 26938fdc4ccd4baa82c2ad5dce227377
              expression: 'last(/Bosch Cameras via Milestone XProtect - RS/milestone.rs.service)=0'
              name: 'Recording Server {HOST.NAME} service is stopped'
              priority: HIGH
              description: 'The Milestone Recording Server service has stopped; all cameras on this RS will be offline for recording.'

        - uuid: 8be92687833843caabdc6ba11c5fe242
          name: 'RS primary storage free %'
          key: 'milestone.rs.storage.free.pct'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[rs_storage_free_pct,{$RS.GUID}]'
          value_type: FLOAT
          units: '%'
          delay: 5m
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: recording_server
            - tag: metric
              value: storage_free_pct
          triggers:
            - uuid: 4dc0102cfb4c490ca9d6e4a64bd11acf
              expression: 'last(/Bosch Cameras via Milestone XProtect - RS/milestone.rs.storage.free.pct)<{$STORAGE.FREE.HIGH.PCT} and last(/Bosch Cameras via Milestone XProtect - RS/milestone.rs.storage.free.pct)>=0'
              name: 'RS {HOST.NAME} primary storage critically low'
              priority: HIGH
            - uuid: 7828c958baa84c1ca38887b851ae2168
              expression: 'last(/Bosch Cameras via Milestone XProtect - RS/milestone.rs.storage.free.pct)<{$STORAGE.FREE.WARN.PCT} and last(/Bosch Cameras via Milestone XProtect - RS/milestone.rs.storage.free.pct)>={$STORAGE.FREE.HIGH.PCT}'
              name: 'RS {HOST.NAME} primary storage low'
              priority: WARNING

    # =================================================================
    # Child template: Camera
    # =================================================================
    - uuid: a6409fb5c704434682937ae656e0d500
      template: 'Bosch Cameras via Milestone XProtect - Camera'
      name: 'Bosch Cameras via Milestone XProtect - Camera'
      description: |
        Per-camera items. Combines Milestone-sourced state with direct
        ICMP/HTTP probes to the Bosch device.

        The discovered host is expected to have user macro {$CAM.GUID}
        populated (the host prototype sets this automatically).
      groups:
        - name: Templates/Video Surveillance
      macros:
        - macro: '{$MILESTONE.HELPER}'
          value: 'milestone_zbx.py'
          description: 'External check script name'
        - macro: '{$CAM.GUID}'
          value: ''
          description: 'Populated per-host by LLD'
        - macro: '{$CAMERA.HTTP.TIMEOUT}'
          value: '5s'
          description: 'HTTP probe timeout (with unit) for direct Bosch check'
        - macro: '{$RETENTION.WARN.DAYS}'
          value: '14'
          description: 'Warn if retention falls below this many days'
        - macro: '{$RETENTION.HIGH.DAYS}'
          value: '7'
          description: 'High severity if retention falls below this many days'

      valuemaps:
        - uuid: 5d7e21cd143e482da452f28d4429819d
          name: 'Online State'
          mappings:
            - value: '0'
              newvalue: 'Offline'
            - value: '1'
              newvalue: 'Online'
            - value: '-1'
              newvalue: 'Unknown'
        - uuid: c3f14d5fff3a4ac1b50ffde317feb3fa
          name: 'Recording State'
          mappings:
            - value: '0'
              newvalue: 'Not Recording'
            - value: '1'
              newvalue: 'Recording'
            - value: '-1'
              newvalue: 'Unknown'

      items:
        - uuid: 65f92714330a49989c5ad9d068410edc
          name: 'Camera online (Milestone)'
          key: 'milestone.cam.state'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[camera_state,{$CAM.GUID}]'
          value_type: UNSIGNED
          delay: 2m
          history: 30d
          trends: 180d
          valuemap:
            name: 'Online State'
          tags:
            - tag: component
              value: camera
            - tag: metric
              value: online_milestone
          triggers:
            - uuid: b16cf0011dac4644978c539782119e42
              expression: 'last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.state)=0'
              name: 'Camera {HOST.NAME} offline (per Milestone)'
              priority: AVERAGE
              description: 'Milestone reports the camera is not responding. Compare with the ICMP probe to isolate whether the camera or the Recording Server is the problem.'

        - uuid: fca4205ff9b54466a45780c1fb1c4685
          name: 'Camera recording (Milestone)'
          key: 'milestone.cam.recording'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[recording_state,{$CAM.GUID}]'
          value_type: UNSIGNED
          delay: 2m
          history: 30d
          trends: 180d
          valuemap:
            name: 'Recording State'
          tags:
            - tag: component
              value: camera
            - tag: metric
              value: recording_state
          triggers:
            - uuid: 1e85f619a4e14524a2f2a3672b92adaa
              expression: 'last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.recording)=0 and last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.state)=1'
              name: 'Camera {HOST.NAME} online but NOT recording'
              priority: HIGH
              description: 'Camera is reachable but Milestone is not recording it - investigate retention rule, licensing, or archive storage.'

        - uuid: e885e9632d154383b9825152e055ee09
          name: 'Retention (days)'
          key: 'milestone.cam.retention'
          type: EXTERNAL
          params: '{$MILESTONE.HELPER}[retention_days,{$CAM.GUID}]'
          value_type: FLOAT
          units: d
          delay: 15m
          history: 90d
          trends: 365d
          tags:
            - tag: component
              value: camera
            - tag: metric
              value: retention_days
          triggers:
            - uuid: 10d615d6332c4de3b26029c8b3002371
              expression: 'last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.retention)<{$RETENTION.HIGH.DAYS}'
              name: 'Camera {HOST.NAME} retention below {$RETENTION.HIGH.DAYS}d'
              priority: HIGH
            - uuid: cda357e160cd47e28be7d7bed81eaa63
              expression: 'last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.retention)<{$RETENTION.WARN.DAYS} and last(/Bosch Cameras via Milestone XProtect - Camera/milestone.cam.retention)>={$RETENTION.HIGH.DAYS}'
              name: 'Camera {HOST.NAME} retention below {$RETENTION.WARN.DAYS}d'
              priority: WARNING

        - uuid: 931a0e04af4c4d89a5d8420ba57d3096
          name: 'ICMP ping'
          key: 'icmpping'
          type: SIMPLE
          value_type: UNSIGNED
          delay: 1m
          history: 7d
          trends: 90d
          tags:
            - tag: component
              value: camera
            - tag: metric
              value: icmp
          triggers:
            - uuid: 0147eb600bd9456a97ac19a302c020a6
              expression: 'max(/Bosch Cameras via Milestone XProtect - Camera/icmpping,#3)=0'
              name: 'Camera {HOST.NAME} unreachable (ICMP)'
              priority: AVERAGE
              description: 'Three consecutive ICMP failures. Combined with the Milestone online trigger, both-firing means the camera is genuinely down; ICMP-only means Milestone may be stale.'

        - uuid: 3b191718662c42c392aace1cbe9b4911
          name: 'Bosch RCP+ device probe'
          key: 'web.page.get[{HOST.CONN},/rcp.xml?command=0x0a04,80]'
          type: SIMPLE
          value_type: TEXT
          delay: 5m
          history: 1d
          timeout: '{$CAMERA.HTTP.TIMEOUT}'
          tags:
            - tag: component
              value: camera
            - tag: metric
              value: rcp_probe
          preprocessing:
            - type: REGEX
              parameters:
                - 'HTTP/1\.[01] (\d+)'
                - '\1'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
