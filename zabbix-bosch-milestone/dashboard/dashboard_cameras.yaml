zabbix_export:
  version: '7.0'
  dashboards:
    - uuid: '58901234567890123890123456789f678'
      name: 'Bosch / Milestone Camera Overview'
      display_period: '30'
      auto_start: 'YES'
      pages:
        - name: 'Overview'
          widgets:
            # Big camera grid (the custom widget) across the top
            - type: 'camera_status'
              name: 'All cameras'
              x: '0'
              y: '0'
              width: '48'
              height: '12'
              fields:
                - type: INTEGER
                  name: columns
                  value: '8'
                - type: INTEGER
                  name: layout
                  value: '0'
                - type: INTEGER
                  name: retention_warn_days
                  value: '7'
                - type: INTEGER
                  name: frame_stale_seconds
                  value: '120'
                - type: INTEGER
                  name: show_offline_only
                  value: '0'

            # Problems-only view on the right
            - type: 'camera_status'
              name: 'Cameras with problems'
              x: '0'
              y: '12'
              width: '24'
              height: '8'
              fields:
                - type: INTEGER
                  name: columns
                  value: '3'
                - type: INTEGER
                  name: layout
                  value: '1'
                - type: INTEGER
                  name: show_offline_only
                  value: '1'

            # Storage gauge
            - type: 'gauge'
              name: 'Milestone storage usage'
              x: '24'
              y: '12'
              width: '12'
              height: '4'
              fields:
                - type: ITEM
                  name: 'itemid.0'
                  value: 'Template Milestone Recording Server:milestone.storage.used_pct'
                - type: STRING
                  name: 'min'
                  value: '0'
                - type: STRING
                  name: 'max'
                  value: '100'
                - type: STRING
                  name: 'units'
                  value: '%'

            # Active problems
            - type: 'problems'
              name: 'Active camera problems'
              x: '36'
              y: '12'
              width: '12'
              height: '8'
              fields:
                - type: HOST_GROUP
                  name: 'groupids'
                  value: 'Cameras/Bosch'
                - type: INTEGER
                  name: 'show'
                  value: '3'
                - type: INTEGER
                  name: 'show_lines'
                  value: '15'

            # Availability over time (uptime of camera.online)
            - type: 'graph'
              name: 'Camera online % (24h)'
              x: '24'
              y: '16'
              width: '12'
              height: '4'
              fields:
                - type: ITEM
                  name: 'itemids.0'
                  value: 'Cameras/Bosch:milestone.camera.online[*]'
