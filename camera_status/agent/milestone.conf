# Place in: C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\plugins.d\milestone.conf
# (or userparameter_milestone.conf for classic agent)
# Then restart Zabbix agent.
#
# Config prerequisites:
#   1. MIP SDK installed on the Milestone server (or a designated poller host)
#   2. C:\ProgramData\zabbix\milestone.config.json with {ServerUri, Username, Password}
#      -> Use a dedicated read-only Milestone user, ACL-restrict the file to SYSTEM + zabbix service account
#   3. Get-MilestoneCameraStatus.ps1 placed in C:\Program Files\Zabbix Agent 2\scripts\

UserParameter=milestone.camera.discover,powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric discover

UserParameter=milestone.camera.online[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric online -CameraGuid "$1"

UserParameter=milestone.camera.recording[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric recording -CameraGuid "$1"

UserParameter=milestone.camera.last_frame[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric last_frame -CameraGuid "$1"

UserParameter=milestone.camera.retention[*],powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric retention -CameraGuid "$1"

UserParameter=milestone.storage.used_pct,powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\Program Files\Zabbix Agent 2\scripts\Get-MilestoneCameraStatus.ps1" -Metric storage_pct

# Timeout note: PowerShell + MIP SDK warmup is slow (~3-5s). Set Timeout=30 in zabbix_agent2.conf.
