zabbix_export:
  version: '7.0'
  dashboards:
    - uuid: a1c2e3f4b5d6a7c8e9f0b1c2d3e4f5a6
      name: 'Video Surveillance - Bosch / Milestone'
      display_period: '30'
      auto_start: 'YES'
      pages:
        - name: Overview
          widgets:
            # Row 1: summary tiles
            - type: 'itemvalue'
              name: 'Cameras online (Milestone)'
              x: '0'
              'y': '0'
              width: '8'
              height: '3'
              fields:
                - type: INTEGER
                  name: show
                  value: '7'        # description + value
                - type: STRING
                  name: description
                  value: 'ONLINE'
                - type: INTEGER
                  name: aggregate_function
                  value: '5'        # count
                - type: INTEGER
                  name: agg_func_enabled
                  value: '1'

            - type: 'itemvalue'
              name: 'Cameras offline (Milestone)'
              x: '8'
              'y': '0'
              width: '8'
              height: '3'
              fields:
                - type: INTEGER
                  name: show
                  value: '7'
                - type: STRING
                  name: description
                  value: 'OFFLINE'

            - type: 'itemvalue'
              name: 'Not recording'
              x: '16'
              'y': '0'
              width: '8'
              height: '3'

            - type: 'itemvalue'
              name: 'RS storage free (min %)'
              x: '24'
              'y': '0'
              width: '8'
              height: '3'

            # Row 2: camera grid
            - type: 'camera_status'
              name: 'Camera Status'
              x: '0'
              'y': '3'
              width: '48'
              height: '9'
              fields:
                - type: INTEGER
                  name: tile_size
                  value: '1'
                - type: INTEGER
                  name: show_retention
                  value: '1'
                - type: INTEGER
                  name: show_rs_grouping
                  value: '1'

            # Row 3: problem list + retention chart
            - type: 'problems'
              name: 'Active surveillance problems'
              x: '0'
              'y': '12'
              width: '24'
              height: '8'
              fields:
                - type: HOST_GROUP
                  name: groupids
                  value: 'Discovered/Bosch Cameras'
                - type: HOST_GROUP
                  name: groupids
                  value: 'Discovered/Milestone Recording Servers'
                - type: INTEGER
                  name: show
                  value: '3'
                - type: INTEGER
                  name: sort_triggers
                  value: '16'       # severity desc

            - type: 'svggraph'
              name: 'Retention days (per camera)'
              x: '24'
              'y': '12'
              width: '24'
              height: '8'
              fields:
                - type: STRING
                  name: 'ds.0.hosts.0'
                  value: 'CAM *'
                - type: STRING
                  name: 'ds.0.items.0'
                  value: 'Retention (days)'
                - type: INTEGER
                  name: 'ds.0.transparency'
                  value: '3'
