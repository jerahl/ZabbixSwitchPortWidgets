zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: c070a4dcf1854fc989bb24876665172a
      name: 'Templates/Network devices'
  host_groups:
    - uuid: 1b7a275229e74d9e8755322a54c54695
      name: 'Discovered APs'
  templates:
    - uuid: 78f16bde0e8442389c8e4fbec0f94bd0
      template: 'Extreme XIQ APs by API'
      name: 'Extreme XIQ APs by API'
      description: |
        Discovers and monitors ExtremeCloud IQ access points via the XIQ REST API.

        ARCHITECTURE
        ────────────
        One fleet host runs the master Script item every 5 minutes. An LLD rule with a
        HOST PROTOTYPE automatically creates one individual Zabbix host per discovered AP.
        Each auto-created host receives:
          • An SNMPv3 agent interface at the AP's management IP ({#IP}:161)
          • The "Extreme AP via SNMPv3" template linked automatically
          • Host macros {$XIQ_DEVICE_ID}, {$XIQ_SERIAL}, {$XIQ_MAC} stamped at creation
          • Proxy assignment to {$XIQ_PROXY} (default: zbx-proxy-tcs-01)

        The AP detail dashboard widget targets these individual per-AP SNMP hosts.
        It reads SNMP history via API::Item()->get() and uses {$XIQ_DEVICE_ID} to drive
        all live ExtremeCloud IQ API calls — no cross-host lookup required.

        REQUIRED MACROS (set on the fleet host)
        ────────────────────────────────────────
          {$XIQ_TOKEN}          - Permanent API token (XIQ → Global Settings → API Token
                                  Management). Set as Secret text type.
          {$XIQ_URL}            - API base URL (default: https://api.extremecloudiq.com)
          {$XIQ_PAGE_SIZE}      - Page size for /devices (default: 100)
          {$XIQ_FUNCTION}       - LLD filter regex for device_function (default: AP)
          {$XIQ_DISCONNECT_TIME}- Duration before disconnect alert fires (default: 10m)
          {$XIQ_PROXY}          - Proxy name for auto-created hosts (default: zbx-proxy-tcs-01)
          {$SNMP_SEC_NAME}      - SNMPv3 security name (username). Override per-host if needed.
          {$SNMP_AUTH_PASS}     - SNMPv3 auth passphrase. Set as Secret text type.
          {$SNMP_PRIV_PASS}     - SNMPv3 priv passphrase. Set as Secret text type.

        AUTH NOTE
        ─────────
        Uses a permanent bearer token, not OAuth2 client credentials. The token does not
        expire on a fixed schedule; revoke and re-issue via XIQ UI if compromised. On any
        401 response the widget surfaces an error — it does not attempt re-auth automatically.

        Tested against XIQ API build 25.9.2-10; verify field names with:
          curl -s "$XIQ_URL/devices?views=FULL&limit=2" \
               -H "Authorization: Bearer $TOKEN" | jq '.data[0] | keys'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: da453e8a881b49f3be91d81932e4cbe3
          name: 'XIQ: Total connected clients'
          type: DEPENDENT
          key: xiq.clients.total
          history: 90d
          description: 'Sum of active_clients across all APs in the fleet.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var arr = JSON.parse(value);
                  var t = 0;
                  for (var i = 0; i < arr.length; i++) t += (arr[i].clients || 0);
                  return t;
          master_item:
            key: xiq.devices.raw
        - uuid: c0765c71a8b84f6dbc184f6390deb75c
          name: 'XIQ: Total APs discovered'
          type: DEPENDENT
          key: xiq.devices.count
          history: 90d
          description: 'Total number of devices returned by the master item.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.length()
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: xiq.devices.raw
        - uuid: 1877d62dd3b64ce8b0125108b163f10e
          name: 'XIQ: Device list (raw)'
          type: SCRIPT
          key: xiq.devices.raw
          delay: 5m
          history: 1d
          value_type: TEXT
          params: |
            var input = JSON.parse(value);
            var token = input.token;
            var baseUrl = input.baseUrl;
            var pageSize = parseInt(input.pageSize, 10);
            if (!pageSize) { pageSize = 100; }
            if (!token) { throw "XIQ token is missing"; }
            var devices = [];
            var page = 1;
            var totalPages = 1;
            var maxPages = 100;
            while (page <= totalPages && page <= maxPages) {
                var req = new HttpRequest();
                req.addHeader("Authorization: Bearer " + token);
                req.addHeader("Accept: application/json");
                var url = baseUrl + "/devices?views=FULL&limit=" + pageSize + "&page=" + page;
                var resp = req.get(url);
                var sc = req.getStatus();
                if (sc !== 200) { throw "XIQ HTTP " + sc + " on page " + page; }
                var body = JSON.parse(resp);
                var rows = body.data;
                if (!rows) { rows = []; }
                for (var i = 0; i < rows.length; i++) {
                    var ap = rows[i];
                    var locStr = "";
                    if (ap.locations && ap.locations.length > 0) {
                        var leaf = ap.locations[ap.locations.length - 1];
                        if (leaf && leaf.name) { locStr = leaf.name; }
                    }
                    devices.push({
                        id:             ap.id || 0,
                        serial:         ap.serial_number || "",
                        hostname:       ap.hostname || "",
                        mac:            ap.mac_address || "",
                        ip:             ap.ip_address || "",
                        model:          ap.product_type || "",
                        version:        ap.software_version || "",
                        func:           ap.device_function || "",
                        connected:      ap.connected === true ? 1 : 0,
                        last_connect:   ap.last_connect_time || 0,
                        clients:        ap.active_clients || 0,
                        uptime:         ap.system_up_time || 0,
                        policy:         ap.network_policy_name || "",
                        config_mismatch: ap.config_mismatch === true ? 1 : 0,
                        admin_state:    ap.device_admin_state || "",
                        location:       locStr,
                        location_id:    ap.location_id || 0
                    });
                }
                totalPages = body.total_pages || 1;
                page++;
            }
            return JSON.stringify(devices);
          description: |
            Master item. Paginates GET /devices?views=FULL and returns a flat JSON array of APs.

            Fields captured per AP (all downstream dependent items source from this):
              id            - XIQ internal device ID (integer) — critical for per-AP API calls
              serial        - Serial number — join key to per-AP SNMP hosts
              hostname      - AP name as configured in XIQ
              mac           - Ethernet MAC address (eth0)
              ip            - Management IP address
              model         - Product type string (e.g. "AP305C")
              version       - Software/firmware version string
              func          - Device function (AP / SWITCH / ROUTER)
              connected     - 1 = connected to XIQ, 0 = disconnected
              last_connect  - Last check-in timestamp (unix ms → converted to s by dependent)
              clients       - Currently associated client count
              uptime        - System uptime (unix ms → converted to s by dependent)
              policy        - Network policy name
              config_mismatch - 1 = config out of sync with XIQ policy
              admin_state   - Administrative state string
              location      - Leaf location name (building/room)
              location_id   - XIQ location ID integer — needed for floor plan API calls
          timeout: 60s
          parameters:
            - name: baseUrl
              value: '{$XIQ_URL}'
            - name: pageSize
              value: '{$XIQ_PAGE_SIZE}'
            - name: token
              value: '{$XIQ_TOKEN}'
      discovery_rules:
        - uuid: f9ad7635e8f34e7084583b9c555f165f
          name: 'XIQ AP discovery'
          type: DEPENDENT
          key: xiq.ap.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FUNCTION}'
                value: '{$XIQ_FUNCTION}'
              - macro: '{#SERIAL}'
                value: ^.+$
              - macro: '{#IP}'
                value: ^.+$
          description: |
            Discovers APs from the master item. Filtered to device_function matching {$XIQ_FUNCTION}.

            LLD macros available for use in item/trigger/graph prototype names and expressions:
              {#HOSTNAME}    - AP hostname
              {#SERIAL}      - Serial number (used as item key discriminator)
              {#ID}          - XIQ internal device ID (integer)
              {#IP}          - Management IP address
              {#MAC}         - Ethernet MAC address
              {#MODEL}       - Product type (e.g. AP305C)
              {#POLICY}      - Network policy name
              {#LOCATION}    - Leaf location name
              {#LOCATION_ID} - XIQ location ID integer
              {#FUNCTION}    - Device function
          item_prototypes:

            # ── Existing items (unchanged) ─────────────────────────────────

            - uuid: a2f88daa52664f159861f96f49fa176c
              name: 'AP {#HOSTNAME}: Active clients'
              type: DEPENDENT
              key: 'xiq.ap.clients[{#SERIAL}]'
              history: 30d
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].clients.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: clients
                - tag: location
                  value: '{#LOCATION}'

            - uuid: 4e7c740c0c174a4c94a8de3c2227d6db
              name: 'AP {#HOSTNAME}: Config mismatch'
              type: DEPENDENT
              key: 'xiq.ap.configmismatch[{#SERIAL}]'
              history: 30d
              valuemap:
                name: 'XIQ config mismatch'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].config_mismatch.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: config
              trigger_prototypes:
                - uuid: 22ccc0eca822498d90637a7fd3c04c87
                  expression: 'last(/Extreme XIQ APs by API/xiq.ap.configmismatch[{#SERIAL}])=1'
                  name: 'AP {#HOSTNAME} ({#SERIAL}) has config mismatch'
                  priority: INFO
                  tags:
                    - tag: ap_serial
                      value: '{#SERIAL}'
                    - tag: scope
                      value: config

            - uuid: 14cc6b82dd3d4e0aa8377d022ea70282
              name: 'AP {#HOSTNAME}: Connected'
              type: DEPENDENT
              key: 'xiq.ap.connected[{#SERIAL}]'
              history: 30d
              trends: 90d
              valuemap:
                name: 'XIQ connected state'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].connected.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_model
                  value: '{#MODEL}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: status
                - tag: location
                  value: '{#LOCATION}'
              trigger_prototypes:
                - uuid: 0f13af259c854a60b6c0839163b71082
                  expression: 'max(/Extreme XIQ APs by API/xiq.ap.connected[{#SERIAL}],{$XIQ_DISCONNECT_TIME})=0'
                  name: 'AP {#HOSTNAME} ({#SERIAL}) is disconnected'
                  priority: WARNING
                  description: 'AP has been reported disconnected by XIQ for at least {$XIQ_DISCONNECT_TIME}.'
                  tags:
                    - tag: ap_model
                      value: '{#MODEL}'
                    - tag: ap_serial
                      value: '{#SERIAL}'
                    - tag: location
                      value: '{#LOCATION}'
                    - tag: scope
                      value: availability

            - uuid: ea6d33be1d5c46b88eddf23400cff628
              name: 'AP {#HOSTNAME}: IP address'
              type: DEPENDENT
              key: 'xiq.ap.ip[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].ip.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: network

            - uuid: cc6740a8e7b4419fad37a1abd9a438fc
              name: 'AP {#HOSTNAME}: Last check-in'
              type: DEPENDENT
              key: 'xiq.ap.lastconnect[{#SERIAL}]'
              history: 30d
              units: unixtime
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].last_connect.first()'
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseInt(value);
                      if (isNaN(n)) return 0;
                      return n > 9999999999 ? Math.floor(n / 1000) : n;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: heartbeat

            - uuid: a58a18e6f96345b8acc863dcb5e6f4d2
              name: 'AP {#HOSTNAME}: Uptime'
              type: DEPENDENT
              key: 'xiq.ap.uptime[{#SERIAL}]'
              history: 30d
              trends: 90d
              units: uptime
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].uptime.first()'
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var n = parseInt(value);
                      if (isNaN(n)) return 0;
                      return n > 9999999999 ? Math.floor(n / 1000) : n;
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: health

            - uuid: 1760852ea4b84921ad19dfd582a6a8bb
              name: 'AP {#HOSTNAME}: Software version'
              type: DEPENDENT
              key: 'xiq.ap.version[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].version.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_id
                  value: '{#ID}'
                - tag: ap_mac
                  value: '{#MAC}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: firmware

            # ── New items — required by AP detail dashboard widget ──────────
            #
            # All fields were already extracted by the master script but had no
            # item prototypes to store them. Added to support WidgetView.php
            # lookups via API::Item()->get() against the fleet host.

            - uuid: d77ee1aac6f3478ba5e38e80e527ba26
              name: 'AP {#HOSTNAME}: XIQ device ID'
              type: DEPENDENT
              key: 'xiq.ap.xiqid[{#SERIAL}]'
              history: 30d
              description: |
                XIQ internal numeric device ID (integer).
                This is the ID used for all per-AP XIQ API calls:
                  GET /devices/{id}
                  GET /devices/{id}/wifi-interfaces/stats
                  GET /clients/active?deviceIds={id}
                  GET /d360/wireless/interfaces-graph?deviceId={id}&channel=WIFI0|WIFI1
                  GET /d360/client/graph?deviceId={id}
                  GET /d360/device/issues?deviceId={id}

                The dashboard widget resolves this ID by:
                  1. Reading the serial number from the per-AP SNMP host
                     (item key: extremeap.serial.0)
                  2. Querying this item on the fleet host using that serial
                  3. Caching the result in APCu for 1 hour

                Alternatively, set host macro {$XIQ_DEVICE_ID} on each per-AP SNMP host
                at provisioning time to skip the lookup entirely.
              value_type: FLOAT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].id.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: identity

            - uuid: b265474e22a5450f88c622aba9eb7f18
              name: 'AP {#HOSTNAME}: Model'
              type: DEPENDENT
              key: 'xiq.ap.model[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              description: 'Product type string as reported by XIQ (e.g. "AP305C"). Used in System Info KV panel.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].model.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: identity

            - uuid: 30a5cc63ec784ec989d79f691ffdad87
              name: 'AP {#HOSTNAME}: MAC address'
              type: DEPENDENT
              key: 'xiq.ap.mac[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              description: |
                Ethernet (eth0) MAC address as reported by XIQ.
                Format: no delimiters, uppercase hex (e.g. "7426AC2CA490").
                Use XIQClient::macInsertColons() for display or cross-system joins.
                Used in System Info KV panel and as the AP BSSID base for
                PacketFence radius_audit_log filtering (called_station_id).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].mac.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: identity

            - uuid: 0e07e3e9c7474f7eb6eca605e827d0b2
              name: 'AP {#HOSTNAME}: Network policy'
              type: DEPENDENT
              key: 'xiq.ap.policy[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              description: 'Network policy name as reported by XIQ. Used in Network Info KV panel.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].policy.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: config

            - uuid: 7fa523c3843a495381e709ad5bce24d9
              name: 'AP {#HOSTNAME}: Admin state'
              type: DEPENDENT
              key: 'xiq.ap.adminstate[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              description: 'Administrative state string from XIQ (e.g. "MANAGED"). Used in System Info KV panel.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].admin_state.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: status

            - uuid: 44b967d5aa3e4ca8b53f0bb9cf913479
              name: 'AP {#HOSTNAME}: Location'
              type: DEPENDENT
              key: 'xiq.ap.location[{#SERIAL}]'
              history: 30d
              value_type: CHAR
              description: 'Leaf location name (building/floor/room) from the XIQ location hierarchy. Used in System Info KV panel and sidecar widget.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].location.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: location

            - uuid: 967376bc8984456f84031fea33a07837
              name: 'AP {#HOSTNAME}: Location ID'
              type: DEPENDENT
              key: 'xiq.ap.locationid[{#SERIAL}]'
              history: 30d
              description: |
                XIQ location ID integer.
                Used by the sidecar widget (M5) to call:
                  GET /locations/{id}          — full location metadata
                  GET /locations/{id}/floor-plan — floor plan image (if available)
              value_type: FLOAT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.serial==''{#SERIAL}'')].location_id.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: xiq.devices.raw
              tags:
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: component
                  value: location

          host_prototypes:
            - uuid: d2c206ee7d69478bab6b235adb545f53
              host: '{#HOSTNAME}'
              name: '{#HOSTNAME}'
              group_links:
                - group:
                    name: 'Discovered APs'
              group_prototypes:
                - name: 'Wireless/{#LOCATION}'
              templates:
                - name: 'Extreme AP via SNMPv3'
              macros:
                - macro: '{$XIQ_DEVICE_ID}'
                  value: '{#ID}'
                  description: 'XIQ internal device ID — used by WidgetView.php for all live XIQ API calls'
                - macro: '{$XIQ_SERIAL}'
                  value: '{#SERIAL}'
                  description: 'Serial number — cross-reference to fleet template item keys'
                - macro: '{$XIQ_MAC}'
                  value: '{#MAC}'
                  description: 'Ethernet MAC (no delimiters) — PF radius_audit_log filter'
                - macro: '{$XIQ_LOCATION_ID}'
                  value: '{#LOCATION_ID}'
                  description: 'XIQ location ID — floor plan API calls in sidecar widget (M5)'
              interfaces:
                - type: SNMP
                  ip: '{#IP}'
                  dns: ''
                  useip: 'YES'
                  port: '161'
                  details:
                    version: SNMPV3
                    bulk: 'YES'
                    contextname: ''
                    securityname: '{$SNMP_SEC_NAME}'
                    securitylevel: AUTHPRIV
                    authprotocol: SHA256
                    authpassphrase: '{$SNMP_AUTH_PASS}'
                    privprotocol: AES128
                    privpassphrase: '{$SNMP_PRIV_PASS}'
              custom_interfaces: 'YES'
              inventory_mode: AUTOMATIC
              tags:
                - tag: ap_model
                  value: '{#MODEL}'
                - tag: ap_serial
                  value: '{#SERIAL}'
                - tag: location
                  value: '{#LOCATION}'
                - tag: network_policy
                  value: '{#POLICY}'
          master_item:
            key: xiq.devices.raw
          lld_macro_paths:
            - lld_macro: '{#FUNCTION}'
              path: $.func
            - lld_macro: '{#HOSTNAME}'
              path: $.hostname
            - lld_macro: '{#ID}'
              path: $.id
            - lld_macro: '{#IP}'
              path: $.ip
            - lld_macro: '{#LOCATION}'
              path: $.location
            - lld_macro: '{#LOCATION_ID}'
              path: $.location_id
            - lld_macro: '{#MAC}'
              path: $.mac
            - lld_macro: '{#MODEL}'
              path: $.model
            - lld_macro: '{#POLICY}'
              path: $.policy
            - lld_macro: '{#SERIAL}'
              path: $.serial
      macros:
        - macro: '{$XIQ_DISCONNECT_TIME}'
          value: 10m
          description: 'How long an AP must be disconnected before alerting'
        - macro: '{$XIQ_FUNCTION}'
          value: AP
          description: 'device_function filter regex (AP, SWITCH, ROUTER, etc.)'
