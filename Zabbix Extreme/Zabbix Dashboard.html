<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zabbix · TCS — BHS-56-Hallway</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Source badges hidden when tweak off */
  html.hide-src-badges .src-badge { display: none !important; }
  /* density tweaks */
  .app[data-density="dense"] .card-b { padding: 10px; }
  .app[data-density="dense"] .health-cell { padding: 12px 8px; }
  .app[data-density="dense"] .kv .k, .app[data-density="dense"] .kv .v, .app[data-density="dense"] .kv .b { padding: 6px 12px; }
  .app[data-density="spacious"] .card-b { padding: 18px; }
  .app[data-density="spacious"] .health-cell { padding: 22px 18px; }
  .app[data-density="spacious"] .kv .k, .app[data-density="spacious"] .kv .v, .app[data-density="spacious"] .kv .b { padding: 12px 16px; }
  /* shrink overview multi-card row at narrow viewports */
  @media (max-width: 1500px) {
    .overview .row[style*="1.4fr 1fr .9fr"] { grid-template-columns: 1fr 1fr !important; }
    .overview .row[style*="1.4fr 1fr .9fr"] > .card:last-child { grid-column: 1 / -1; }
  }
  @media (max-width: 1280px) {
    .app { grid-template-columns: 64px 1fr; }
    .sidebar .nav-label, .sidebar .brand div:not(.brand-mark), .sidebar .nav-item span:not(.nav-count), .sidebar-footer { display: none; }
    .sidebar .nav-item { justify-content: center; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="tabs.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
