# Zabbix agent configuration for Windows DHCP server
#
# Deploy to: C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\dhcp.conf
#   (or zabbix_agentd.d\ for agent 1)
#
# After adding this file, restart the Zabbix Agent service:
#   Restart-Service "Zabbix Agent 2"
#
# Add the item on the DHCP server host in Zabbix:
#   Key:      dhcp.leases
#   Type:     Zabbix agent (active or passive)
#   Type of information: Text
#   Update interval: 5m
#   History storage period: 1h (lease table changes constantly)
#   Trends: Do not keep

# Increase timeout for the powershell invocation; the DHCP module can be slow
# on busy servers with thousands of leases.
Timeout=30

# UserParameter: dhcp.leases invokes the PS script and returns its JSON output.
# -NoProfile skips user profile load (~500ms faster)
# -ExecutionPolicy Bypass lets unsigned scripts run
# -File ensures the script is executed, not interpreted as a command
UserParameter=dhcp.leases,powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\zabbix\scripts\dhcp-leases.ps1"
