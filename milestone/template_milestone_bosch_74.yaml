zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: ae594436d5584d85b34ddfa0b0e53a51
      name: Templates/Video
  host_groups:
    - uuid: 39f24b29cef24740823fe3b697498cd1
      name: Video/Milestone
    - uuid: e3943b99d3a945dfaffc12d567113221
      name: Video/Bosch cameras
  templates:

    # =========================================================================
    # TEMPLATE 1 — Milestone XProtect
    #
    # Design note: Zabbix HTTP-agent items cannot reference another item's
    # value in their headers/body, so we use Script items (JavaScript runtime
    # inside Zabbix server/proxy) as master items. Each master script
    # authenticates against the IDP, calls the API, and returns a JSON blob
    # that dependent items parse with JSONPath preprocessing. This matches
    # the approach used in the lestoilfante MilestoneSys Zabbix 6.0 template.
    # =========================================================================
    - uuid: 26b1f4278c4744049d0c9c6d1289d29e
      template: 'Milestone XProtect by HTTP'
      name: 'Milestone XProtect by HTTP'
      description: |
        Monitors a Milestone XProtect VMS site via the API Gateway REST API
        (MIP VMS API, /api/rest/v1).
        
        Uses Script items to combine OAuth2 token acquisition and REST calls
        in a single JavaScript invocation, avoiding the need to store the
        token in a user macro. Discovers recording servers and cameras
        automatically.
        
        Inspired by lestoilfante/zabbix-integrations MilestoneSys template
        (Zabbix 6.0), ported and extended for Zabbix 7.4 with a template
        dashboard and camera-level low-level discovery.
        
        Requirements:
        - XProtect 2022 R1 or later with API Gateway installed and reachable
        - An XProtect Basic user whose role can read Management Server,
          Recording Server and device configuration
        - Network reachability from the Zabbix server/proxy to the API
          Gateway (TCP 443 for HTTPS, TCP 80 for HTTP)
        
        Required host macros:
        - {$MILESTONE.HOST}      — FQDN/IP of the API Gateway
        - {$MILESTONE.SCHEME}    — http or https (default: https)
        - {$MILESTONE.USER}      — XProtect Basic user name
        - {$MILESTONE.PASSWORD}  — XProtect Basic user password
        - {$MILESTONE.CLIENT_ID} — OAuth client id (default GrantValidatorClient)
      vendor:
        name: Community
        version: '7.4-0'
      groups:
        - name: Templates/Video

      items:

        # ------------------------------------------------------------------
        # Master item: authenticate and fetch /sites.
        # ------------------------------------------------------------------
        - uuid: 2994e644fffc406489465e8b055f265b
          name: 'Milestone: Get sites (master)'
          type: SCRIPT
          key: milestone.sites.get
          delay: 5m
          history: '0'
          trends: '0'
          value_type: TEXT
          description: |
            Logs into the IDP with Resource Owner Password Credentials,
            gets an access token, and fetches the /sites collection.
          timeout: '30s'
          parameters:
            - name: host
              value: '{$MILESTONE.HOST}'
            - name: scheme
              value: '{$MILESTONE.SCHEME}'
            - name: user
              value: '{$MILESTONE.USER}'
            - name: password
              value: '{$MILESTONE.PASSWORD}'
            - name: client_id
              value: '{$MILESTONE.CLIENT_ID}'
          params: |
            // Milestone master script — authenticate and call /sites
            var p = JSON.parse(value);
            var base = p.scheme + '://' + p.host;
            
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/x-www-form-urlencoded');
            var body = 'grant_type=password'
              + '&username=' + encodeURIComponent(p.user)
              + '&password=' + encodeURIComponent(p.password)
              + '&client_id=' + encodeURIComponent(p.client_id);
            
            var tokenResp = req.post(base + '/IDP/connect/token', body);
            if (req.getStatus() !== 200) {
              throw 'IDP error ' + req.getStatus() + ': ' + tokenResp;
            }
            var token = JSON.parse(tokenResp).access_token;
            if (!token) throw 'No access_token returned';
            
            var req2 = new HttpRequest();
            req2.addHeader('Authorization: Bearer ' + token);
            req2.addHeader('Accept: application/json');
            var r = req2.get(base + '/api/rest/v1/sites');
            if (req2.getStatus() !== 200) {
              throw 'sites error ' + req2.getStatus() + ': ' + r;
            }
            return r;
          tags:
            - tag: component
              value: site

        - uuid: e77dbc8e9198488ea1ea1abcf9a957b1
          name: 'Milestone: Site name'
          type: DEPENDENT
          key: milestone.site.name
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: milestone.sites.get
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.array[0].displayName
          tags:
            - tag: component
              value: site

        - uuid: e2d848b8bb9144edb9c5af94c32ebdf0
          name: 'Milestone: Management Server version'
          type: DEPENDENT
          key: milestone.site.version
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: milestone.sites.get
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.array[0].version
          tags:
            - tag: component
              value: site

        - uuid: 282d2127cd9b4cc5a41e922b03ea1754
          name: 'Milestone: Site physical memory'
          type: DEPENDENT
          key: milestone.site.physicalmemory
          delay: '0'
          units: B
          master_item:
            key: milestone.sites.get
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.array[0].physicalMemory
          tags:
            - tag: component
              value: site

        - uuid: 878d9bdc70314fc0a2b8b47725a06f04
          name: 'Milestone: Last status handshake'
          type: DEPENDENT
          key: milestone.site.lasthandshake
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: milestone.sites.get
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.array[0].lastStatusHandshake
          tags:
            - tag: component
              value: site

        - uuid: b4eb9497f6df4f7fbdd0529af283c398
          name: 'Milestone: Seconds since last handshake'
          type: DEPENDENT
          key: milestone.site.handshake.age
          delay: '0'
          units: s
          master_item:
            key: milestone.sites.get
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.array[0].lastStatusHandshake
            - type: JAVASCRIPT
              parameters:
                - |
                  if (!value) return 0;
                  var ts = Date.parse(value);
                  if (isNaN(ts)) return 0;
                  return Math.floor((Date.now() - ts) / 1000);
          tags:
            - tag: component
              value: site

        # ------------------------------------------------------------------
        # API Gateway reachability
        # ------------------------------------------------------------------
        - uuid: db5fce078cdc45398bee281a2732b01d
          name: 'Milestone: API Gateway TCP reachable'
          type: SIMPLE
          key: 'net.tcp.service[tcp,{$MILESTONE.HOST},443]'
          delay: 30s
          description: Basic reachability check on TCP/443.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: api-gateway

        # ------------------------------------------------------------------
        # License overview — master item
        # ------------------------------------------------------------------
        - uuid: 85597146e2d84e42845141a02c5d06cc
          name: 'Milestone: License overview (master)'
          type: SCRIPT
          key: milestone.license.get
          delay: 1h
          history: '0'
          trends: '0'
          value_type: TEXT
          timeout: '30s'
          parameters:
            - name: host
              value: '{$MILESTONE.HOST}'
            - name: scheme
              value: '{$MILESTONE.SCHEME}'
            - name: user
              value: '{$MILESTONE.USER}'
            - name: password
              value: '{$MILESTONE.PASSWORD}'
            - name: client_id
              value: '{$MILESTONE.CLIENT_ID}'
          params: |
            var p = JSON.parse(value);
            var base = p.scheme + '://' + p.host;
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/x-www-form-urlencoded');
            var tokenResp = req.post(base + '/IDP/connect/token',
              'grant_type=password'
              + '&username=' + encodeURIComponent(p.user)
              + '&password=' + encodeURIComponent(p.password)
              + '&client_id=' + encodeURIComponent(p.client_id));
            if (req.getStatus() !== 200) throw 'IDP error ' + req.getStatus();
            var token = JSON.parse(tokenResp).access_token;
            var req2 = new HttpRequest();
            req2.addHeader('Authorization: Bearer ' + token);
            req2.addHeader('Accept: application/json');
            var r = req2.get(base + '/api/rest/v1/licenseOverviewAll');
            if (req2.getStatus() !== 200) {
              throw 'license error ' + req2.getStatus() + ': ' + r;
            }
            return r;
          tags:
            - tag: component
              value: license

        # ------------------------------------------------------------------
        # Batch master: all recording servers in ONE call.
        # Returns a keyed object { "<rs-id>": {<rs record>}, ... } so that
        # per-RS dependent items can JSONPath $.<rs-id>.<field> in O(1).
        # ------------------------------------------------------------------
        - uuid: a306ea0d27174d7990722148465d9d0b
          name: 'Milestone: Get all recording servers (batch master)'
          type: SCRIPT
          key: milestone.rs.getall
          delay: 2m
          history: '0'
          trends: '0'
          value_type: TEXT
          description: |
            One API call returning every recording server's full record.
            All per-RS items and the RS LLD rule depend on this item so
            that scale is O(1) API calls regardless of RS count.
          timeout: '60s'
          parameters:
            - name: host
              value: '{$MILESTONE.HOST}'
            - name: scheme
              value: '{$MILESTONE.SCHEME}'
            - name: user
              value: '{$MILESTONE.USER}'
            - name: password
              value: '{$MILESTONE.PASSWORD}'
            - name: client_id
              value: '{$MILESTONE.CLIENT_ID}'
          params: |
            var p = JSON.parse(value);
            var base = p.scheme + '://' + p.host;
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/x-www-form-urlencoded');
            var tokenResp = req.post(base + '/IDP/connect/token',
              'grant_type=password'
              + '&username=' + encodeURIComponent(p.user)
              + '&password=' + encodeURIComponent(p.password)
              + '&client_id=' + encodeURIComponent(p.client_id));
            if (req.getStatus() !== 200) {
              throw 'IDP error ' + req.getStatus() + ': ' + tokenResp;
            }
            var token = JSON.parse(tokenResp).access_token;
            var req2 = new HttpRequest();
            req2.addHeader('Authorization: Bearer ' + token);
            req2.addHeader('Accept: application/json');
            var r = req2.get(base + '/api/rest/v1/recordingServers?disabled');
            if (req2.getStatus() !== 200) {
              throw 'RS list error ' + req2.getStatus() + ': ' + r;
            }
            return r;
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // Re-key the array by id so dependents can look up in O(1)
                  var parsed = JSON.parse(value);
                  var arr = parsed.array || [];
                  var out = {};
                  for (var i = 0; i < arr.length; i++) {
                    if (arr[i] && arr[i].id) out[arr[i].id] = arr[i];
                  }
                  return JSON.stringify(out);
          tags:
            - tag: component
              value: recording-server

        # ------------------------------------------------------------------
        # Batch master: all cameras in ONE call.
        # At 2500+ cameras this replaces 2500 individual Script items with
        # a single call every poll cycle. Returned as a keyed lookup object.
        # ------------------------------------------------------------------
        - uuid: f370cf5bc43140869b083d6525c3c49d
          name: 'Milestone: Get all cameras (batch master)'
          type: SCRIPT
          key: milestone.cam.getall
          delay: 5m
          history: '0'
          trends: '0'
          value_type: TEXT
          description: |
            One API call returning every camera's full record. All per-camera
            items and the camera LLD rule depend on this item so that scale
            is O(1) API calls regardless of camera count.
          timeout: '120s'
          parameters:
            - name: host
              value: '{$MILESTONE.HOST}'
            - name: scheme
              value: '{$MILESTONE.SCHEME}'
            - name: user
              value: '{$MILESTONE.USER}'
            - name: password
              value: '{$MILESTONE.PASSWORD}'
            - name: client_id
              value: '{$MILESTONE.CLIENT_ID}'
          params: |
            var p = JSON.parse(value);
            var base = p.scheme + '://' + p.host;
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/x-www-form-urlencoded');
            var tokenResp = req.post(base + '/IDP/connect/token',
              'grant_type=password'
              + '&username=' + encodeURIComponent(p.user)
              + '&password=' + encodeURIComponent(p.password)
              + '&client_id=' + encodeURIComponent(p.client_id));
            if (req.getStatus() !== 200) {
              throw 'IDP error ' + req.getStatus() + ': ' + tokenResp;
            }
            var token = JSON.parse(tokenResp).access_token;
            var req2 = new HttpRequest();
            req2.addHeader('Authorization: Bearer ' + token);
            req2.addHeader('Accept: application/json');
            // ?page=0&size=10000 — the API paginates at 500 by default; ask for everything.
            var r = req2.get(base + '/api/rest/v1/cameras?disabled&page=0&size=10000');
            if (req2.getStatus() !== 200) {
              throw 'cameras error ' + req2.getStatus() + ': ' + r;
            }
            return r;
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // Re-key the array by id so dependents can look up in O(1).
                  // Also keep the original array in __array so the LLD rule
                  // can still iterate for discovery.
                  var parsed = JSON.parse(value);
                  var arr = parsed.array || [];
                  var out = { __array: arr };
                  for (var i = 0; i < arr.length; i++) {
                    if (arr[i] && arr[i].id) out[arr[i].id] = arr[i];
                  }
                  return JSON.stringify(out);
          tags:
            - tag: component
              value: camera

        # ------------------------------------------------------------------
        # ESS (Event & States Service) live camera state snapshot.
        #
        # Architecture note: the actual WebSocket call to Milestone takes
        # 1-2 minutes at 2500+ cameras, and Zabbix caps external-check
        # timeouts at 30 seconds. So the fetch is split in two:
        #
        #   milestone_ess_refresh.sh   runs from cron (independent of Zabbix),
        #                              does the slow WebSocket fetch, writes
        #                              /var/lib/zabbix/milestone_ess_state.json
        #                              atomically.
        #   milestone_ess_read.sh      is what THIS Zabbix item calls; it just
        #                              cats the JSON file, completing in ms.
        #
        # The item's 'delay' is how often Zabbix re-reads the cached file —
        # not how often the real snapshot happens. Control that with cron.
        #
        # Install:
        #   1. Copy milestone_ess_state.py, milestone_ess_refresh.sh,
        #      and milestone_ess_read.sh to /usr/lib/zabbix/externalscripts/
        #      (owned zabbix:zabbix, mode 0750).
        #   2. pip3 install 'websockets>=11' 'aiohttp>=3.8' for the zabbix user.
        #   3. Add a cron entry:
        #        15 3 * * * /usr/lib/zabbix/externalscripts/milestone_ess_refresh.sh \
        #                    milestone.example.com zbx_monitor 'password' --scheme https
        #   4. Make sure zabbix can write /var/lib/zabbix and /var/log/zabbix.
        # ------------------------------------------------------------------
        - uuid: 0c36cd75bd4944299009e53c05e5e7c9
          name: 'Milestone: ESS live camera state snapshot'
          type: EXTERNAL
          key: 'milestone_ess_read.sh[]'
          delay: '{$MILESTONE.ESS.DELAY}'
          history: 7d
          trends: '0'
          value_type: TEXT
          timeout: '10s'
          description: |
            Invokes /usr/lib/zabbix/externalscripts/milestone_ess_state.py
            which opens a WebSocket to the Milestone Event & States Service,
            calls get_state, and returns per-camera live state. Dependent
            items below this parse individual fields with JSONPath.

            Default delay is daily; override with {$MILESTONE.ESS.DELAY}
            (for example, 6h or 1h for tighter cadence at cost of load).
          tags:
            - tag: component
              value: camera-state

      discovery_rules:

        # =====================================================================
        # LLD 1 — Recording Servers (dependent on batch master)
        # =====================================================================
        - uuid: 3f88ab587d5048fd8698550a4f951d01
          name: 'Milestone: Recording Server discovery'
          type: DEPENDENT
          key: milestone.recordingservers.discovery
          delay: '0'
          lifetime: 2d
          master_item:
            key: milestone.rs.getall
          lld_macro_paths:
            - lld_macro: '{#RS.ID}'
              path: $.id
            - lld_macro: '{#RS.NAME}'
              path: $.displayName
            - lld_macro: '{#RS.DESCRIPTION}'
              path: $.description
          preprocessing:
            # Batch master returns {"<id>":{...}}. Convert map values to a
            # JSON array so LLD can iterate.
            - type: JAVASCRIPT
              parameters:
                - |
                  var obj = JSON.parse(value);
                  var out = [];
                  for (var k in obj) {
                    if (obj.hasOwnProperty(k)) out.push(obj[k]);
                  }
                  return JSON.stringify(out);
            - type: JSONPATH
              parameters:
                - $.[*]

          item_prototypes:

            - uuid: 6574c1c3cb684630a5f469181c7824c4
              name: 'RS [{#RS.NAME}]: Detail (per-RS dependent master)'
              type: DEPENDENT
              key: 'milestone.rs.raw[{#RS.ID}]'
              delay: '0'
              history: '0'
              trends: '0'
              value_type: TEXT
              description: |
                Extracts this RS's record from the batch master. Per-field
                items below depend on this so value-cache lookups stay local.
              master_item:
                key: milestone.rs.getall
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $["{#RS.ID}"]
                # If the RS vanishes from the list (deleted/moved), suppress
                # the update rather than store an empty value.
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

            - uuid: e3f73eb528b14aa59ad51c3a6479dac6
              name: 'RS [{#RS.NAME}]: Last handshake'
              type: DEPENDENT
              key: 'milestone.rs.lasthandshake[{#RS.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastStatusHandshake
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

            - uuid: de55563163be4052a1ca21e0df9498fb
              name: 'RS [{#RS.NAME}]: Seconds since last handshake'
              type: DEPENDENT
              key: 'milestone.rs.handshake.age[{#RS.ID}]'
              delay: '0'
              units: s
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastStatusHandshake
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (!value) return 0;
                      var ts = Date.parse(value);
                      if (isNaN(ts)) return 0;
                      return Math.floor((Date.now() - ts) / 1000);
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

            - uuid: e985ec7b69414435bde4c0bea79c18a7
              name: 'RS [{#RS.NAME}]: Version'
              type: DEPENDENT
              key: 'milestone.rs.version[{#RS.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.version
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

            - uuid: 2029189a6ee14ed4825d57c2f220dd77
              name: 'RS [{#RS.NAME}]: Enabled'
              type: DEPENDENT
              key: 'milestone.rs.enabled[{#RS.ID}]'
              delay: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.enabled
              valuemap:
                name: 'Bool string'
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

            - uuid: 95686a1bc70a41aba2c69fe74560ad9a
              name: 'RS [{#RS.NAME}]: Host name'
              type: DEPENDENT
              key: 'milestone.rs.hostname[{#RS.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.rs.raw[{#RS.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.hostName
              tags:
                - tag: component
                  value: recording-server
                - tag: recording-server
                  value: '{#RS.NAME}'

          trigger_prototypes:

            - uuid: ab618965918645129964db3a3fb34de9
              expression: 'last(/Milestone XProtect by HTTP/milestone.rs.handshake.age[{#RS.ID}])>300'
              name: 'RS [{#RS.NAME}]: handshake stale (>5m)'
              priority: HIGH
              description: |
                The recording server has not checked in with the management
                server in the last 5 minutes. The server or recorder service
                may be down.

            - uuid: ec5e8bfc0dfe4d379cfaef1a175fbab6
              expression: 'last(/Milestone XProtect by HTTP/milestone.rs.enabled[{#RS.ID}])="False"'
              name: 'RS [{#RS.NAME}]: disabled in XProtect'
              priority: WARNING

            - uuid: 509f5e38e5b14063b6b1dca43003483e
              expression: 'nodata(/Milestone XProtect by HTTP/milestone.rs.raw[{#RS.ID}],15m)=1'
              name: 'RS [{#RS.NAME}]: no API data for 15m'
              priority: AVERAGE

        # =====================================================================
        # LLD 2 — Cameras (dependent on batch master)
        # =====================================================================
        - uuid: db6d9ff5138549cb91d48e64b78f1505
          name: 'Milestone: Camera discovery'
          type: DEPENDENT
          key: milestone.cameras.discovery
          delay: '0'
          lifetime: 7d
          master_item:
            key: milestone.cam.getall
          filter:
            evaltype: AND
            conditions:
              - macro: '{#CAM.NAME}'
                value: '{$MILESTONE.CAM.NAME.MATCHES}'
                formulaid: A
              - macro: '{#CAM.NAME}'
                value: '{$MILESTONE.CAM.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          lld_macro_paths:
            - lld_macro: '{#CAM.ID}'
              path: $.id
            - lld_macro: '{#CAM.NAME}'
              path: $.displayName
            - lld_macro: '{#CAM.ENABLED}'
              path: $.enabled
          preprocessing:
            # Batch master stores original array at __array. Pull it out
            # so LLD can iterate.
            - type: JSONPATH
              parameters:
                - $.__array[*]

          item_prototypes:

            - uuid: 9a3122b3739b44239aed25195e1a8a6b
              name: 'Cam [{#CAM.NAME}]: Detail (per-camera dependent master)'
              type: DEPENDENT
              key: 'milestone.cam.raw[{#CAM.ID}]'
              delay: '0'
              history: '0'
              trends: '0'
              value_type: TEXT
              description: |
                Extracts this camera's record from the batch master. Per-field
                items below depend on this. At 2500 cameras this means zero
                additional API calls per camera — everything rides on the
                single milestone.cam.getall call.
              master_item:
                key: milestone.cam.getall
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $["{#CAM.ID}"]
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: camera
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: 40685d55f7554b578c8280c412f6f4fb
              name: 'Cam [{#CAM.NAME}]: Enabled'
              type: DEPENDENT
              key: 'milestone.cam.enabled[{#CAM.ID}]'
              delay: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.enabled
              valuemap:
                name: 'Bool string'
              tags:
                - tag: component
                  value: camera
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: d40cb1b169664db292e0e55717b5f9a2
              name: 'Cam [{#CAM.NAME}]: Last modified'
              type: DEPENDENT
              key: 'milestone.cam.lastmodified[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.lastModified
              tags:
                - tag: component
                  value: camera
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: e181e9ad996b4853b7abf142f06a1488
              name: 'Cam [{#CAM.NAME}]: Channel'
              type: DEPENDENT
              key: 'milestone.cam.channel[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.channel
              tags:
                - tag: component
                  value: camera
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: 03e6a28248d94a4c9f935c7d7c2b03ed
              name: 'Cam [{#CAM.NAME}]: Recording server id'
              type: DEPENDENT
              key: 'milestone.cam.rs[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.cam.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.relations.parent.id
              tags:
                - tag: component
                  value: camera
                - tag: camera
                  value: '{#CAM.NAME}'

            # --------------------------------------------------------------
            # ESS live-state prototypes. These ride on the once-a-day ESS
            # snapshot master, so they're free — no additional API calls,
            # no per-camera WebSocket sessions.
            #
            # The external helper pivots the raw ESS states into:
            #   { "count": N,
            #     "cameras": { "<cam-guid>": {
            #         "states":   [<raw state objects>],
            #         "by_group": { "<state-group-guid>": {"type": "<type-guid>", "time": "..."} }
            #     }}}
            #
            # Each Milestone "state group" (communication, recording, motion, ...)
            # maps to a GUID that is INSTALL-SPECIFIC, so the template cannot
            # hardcode it. Before these items are useful:
            #
            #   1. Run the helper with --list-stategroups once on the server:
            #        milestone_ess_state.py <host> <user> <pass> --list-stategroups
            #   2. Identify which GUIDs correspond to Communication, Recording, Motion
            #      by correlating "cameras: N" counts with known live/recording/etc.
            #   3. Set {$MILESTONE.ESS.STATEGROUP.COMMUNICATION},
            #          {$MILESTONE.ESS.STATEGROUP.RECORDING},
            #          {$MILESTONE.ESS.STATEGROUP.MOTION}
            #      on the host to the GUIDs you identified.
            #   4. Separately, set {$MILESTONE.ESS.TYPE.COMMUNICATION_OK} and
            #      {$MILESTONE.ESS.TYPE.RECORDING_STARTED} to the type-GUIDs
            #      that represent the "good" state within each group.
            #
            # Until the macros are set, the extracted items will be empty and
            # the triggers will stay quiet — no false alarms from missing config.
            # --------------------------------------------------------------
            - uuid: fd315cb9ebfa49f3b1b3fb1afcfe7c65
              name: 'Cam [{#CAM.NAME}]: ESS state record'
              type: DEPENDENT
              key: 'milestone.cam.ess.raw[{#CAM.ID}]'
              delay: '0'
              history: '0'
              trends: '0'
              value_type: TEXT
              description: |
                Full ESS state record for this camera, extracted from the
                daily snapshot. Contains 'states' (raw array) and 'by_group'
                (map keyed by stategroupid) for downstream items to parse.
              master_item:
                key: 'milestone_ess_read.sh[]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.cameras["{#CAM.ID}"]
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '{}'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 7d
              tags:
                - tag: component
                  value: camera-state
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: cb57e7943d1149d0839aa7fc666630c3
              name: 'Cam [{#CAM.NAME}]: Communication state type GUID (ESS)'
              type: DEPENDENT
              key: 'milestone.cam.ess.comm.type[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              description: |
                Type GUID of this camera's current state within the
                communication state group. Compare against
                {$MILESTONE.ESS.TYPE.COMMUNICATION_OK} in a trigger.
              master_item:
                key: 'milestone.cam.ess.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.by_group["{$MILESTONE.ESS.STATEGROUP.COMMUNICATION}"].type
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: camera-state
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: 6e8b16ce151d45fea8c2e9940381dd4f
              name: 'Cam [{#CAM.NAME}]: Recording state type GUID (ESS)'
              type: DEPENDENT
              key: 'milestone.cam.ess.rec.type[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              description: |
                Type GUID of this camera's current state within the
                recording state group. Compare against
                {$MILESTONE.ESS.TYPE.RECORDING_STARTED} in a trigger.
              master_item:
                key: 'milestone.cam.ess.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.by_group["{$MILESTONE.ESS.STATEGROUP.RECORDING}"].type
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: camera-state
                - tag: camera
                  value: '{#CAM.NAME}'

            - uuid: 1f390508bd76487a9a3b9608bea90870
              name: 'Cam [{#CAM.NAME}]: Communication state last change (ESS)'
              type: DEPENDENT
              key: 'milestone.cam.ess.comm.time[{#CAM.ID}]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              master_item:
                key: 'milestone.cam.ess.raw[{#CAM.ID}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.by_group["{$MILESTONE.ESS.STATEGROUP.COMMUNICATION}"].time
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: camera-state
                - tag: camera
                  value: '{#CAM.NAME}'

          trigger_prototypes:

            - uuid: f113a0645289483aa14dad319f42c9f8
              expression: 'last(/Milestone XProtect by HTTP/milestone.cam.enabled[{#CAM.ID}])="False"'
              name: 'Cam [{#CAM.NAME}]: disabled in XProtect'
              priority: WARNING

            - uuid: 81a2135069de42b99bdae28df3595c14
              expression: 'nodata(/Milestone XProtect by HTTP/milestone.cam.raw[{#CAM.ID}],15m)=1'
              name: 'Cam [{#CAM.NAME}]: no data for 15m (API unreachable or removed)'
              priority: AVERAGE

            # ESS triggers fire only when the user has filled in both the
            # stategroup-GUID and type-GUID macros. Until then, the comparison
            # 'x <> ""' on an empty macro evaluates to 'x <> ""' which
            # Zabbix rejects as invalid and the trigger stays disabled —
            # meaning no false alarms from unconfigured templates.
            - uuid: a7aeb84a29464b9eacfae1cd0ab3f199
              expression: 'last(/Milestone XProtect by HTTP/milestone.cam.ess.comm.type[{#CAM.ID}])<>"{$MILESTONE.ESS.TYPE.COMMUNICATION_OK}" and last(/Milestone XProtect by HTTP/milestone.cam.enabled[{#CAM.ID}])="True" and length(last(/Milestone XProtect by HTTP/milestone.cam.ess.comm.type[{#CAM.ID}]))>0'
              name: 'Cam [{#CAM.NAME}]: communication not OK (per last ESS snapshot)'
              priority: HIGH
              description: |
                Camera is enabled in XProtect but the last ESS snapshot
                reported a communication-state type other than the
                "OK" GUID. Requires
                {$MILESTONE.ESS.TYPE.COMMUNICATION_OK} and
                {$MILESTONE.ESS.STATEGROUP.COMMUNICATION} to be set
                on the host — see the template description for how to
                discover these GUIDs.

            - uuid: dd5ec3cfb9df49ca94ade9ce299c15f6
              expression: 'last(/Milestone XProtect by HTTP/milestone.cam.ess.rec.type[{#CAM.ID}])<>"{$MILESTONE.ESS.TYPE.RECORDING_STARTED}" and last(/Milestone XProtect by HTTP/milestone.cam.enabled[{#CAM.ID}])="True" and length(last(/Milestone XProtect by HTTP/milestone.cam.ess.rec.type[{#CAM.ID}]))>0'
              name: 'Cam [{#CAM.NAME}]: not recording (per last ESS snapshot)'
              priority: AVERAGE
              description: |
                Camera is enabled but the last ESS snapshot reported a
                recording-state type other than the "Started" GUID.
                Requires {$MILESTONE.ESS.TYPE.RECORDING_STARTED} and
                {$MILESTONE.ESS.STATEGROUP.RECORDING} to be set.

      macros:
        - macro: '{$MILESTONE.HOST}'
          value: '127.0.0.1'
          description: API Gateway hostname or IP.
        - macro: '{$MILESTONE.SCHEME}'
          value: 'https'
          description: http or https.
        - macro: '{$MILESTONE.USER}'
          value: ''
          description: XProtect Basic user name.
        - macro: '{$MILESTONE.PASSWORD}'
          value: ''
          type: SECRET_TEXT
          description: XProtect Basic user password.
        - macro: '{$MILESTONE.CLIENT_ID}'
          value: 'GrantValidatorClient'
          description: OAuth client id for the built-in IDP.
        - macro: '{$MILESTONE.CAM.NAME.MATCHES}'
          value: '.*'
          description: Regex of camera names to include (default all).
        - macro: '{$MILESTONE.CAM.NAME.NOT_MATCHES}'
          value: '^$'
          description: Regex of camera names to exclude.
        - macro: '{$MILESTONE.ESS.DELAY}'
          value: '1d'
          description: |
            Poll interval for the ESS live-state snapshot. Default 1 day.
            Valid Zabbix time suffixes: s, m, h, d. Example: 6h, 30m.
        - macro: '{$MILESTONE.ESS.STATEGROUP.COMMUNICATION}'
          value: ''
          description: |
            GUID of the communication-state group in your install.
            Discover with: milestone_ess_state.py ... --list-stategroups
        - macro: '{$MILESTONE.ESS.STATEGROUP.RECORDING}'
          value: ''
          description: |
            GUID of the recording-state group in your install.
        - macro: '{$MILESTONE.ESS.TYPE.COMMUNICATION_OK}'
          value: ''
          description: |
            GUID of the "communication is OK / camera connected" event
            type within the communication stategroup. Triggers compare
            against this GUID.
        - macro: '{$MILESTONE.ESS.TYPE.RECORDING_STARTED}'
          value: ''
          description: |
            GUID of the "recording started / ongoing" event type within
            the recording stategroup.

      valuemaps:
        - uuid: 6e0a21b3c8e64f24b1fdb6054f1ea8d2
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: 'Down'
            - value: '1'
              newvalue: 'Up'
        - uuid: 2c80feffa4fa479ab70a6e1498e03c20
          name: 'Bool string'
          mappings:
            - value: 'True'
              newvalue: 'Enabled'
            - value: 'False'
              newvalue: 'Disabled'

      dashboards:
        - uuid: 698e3551a9f346029e3f312a95c20e5b
          name: 'Milestone XProtect overview'
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'Site'
                  x: '0'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Milestone XProtect by HTTP'
                        key: milestone.site.name
                - type: item
                  name: 'Mgmt Server version'
                  x: '18'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Milestone XProtect by HTTP'
                        key: milestone.site.version
                - type: item
                  name: 'Physical memory'
                  x: '36'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Milestone XProtect by HTTP'
                        key: milestone.site.physicalmemory
                - type: item
                  name: 'API Gateway'
                  x: '54'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Milestone XProtect by HTTP'
                        key: 'net.tcp.service[tcp,{$MILESTONE.HOST},443]'
                - type: problems
                  name: 'Active problems (this host)'
                  x: '0'
                  'y': '3'
                  width: '72'
                  height: '7'

    # =========================================================================
    # TEMPLATE 2 — Bosch IP camera, direct monitoring via RCP+ over CGI
    # =========================================================================
    - uuid: 150a9dac982846d5a79a0d5a904941c9
      template: 'Bosch IP camera by HTTP'
      name: 'Bosch IP camera by HTTP'
      description: |
        Direct monitoring of a Bosch IP camera via RCP+ over CGI
        (/rcp.xml). Provides reachability, firmware, device name, encoder
        load and uptime metrics.
        
        This template complements the Milestone template: the Milestone
        template tells you how XProtect sees the camera; this template
        tells you what the camera itself says.
        
        Requirements:
        - Camera firmware with RCP+ v3 (nearly all Bosch IP cameras since 2012)
        - A service-level user on the camera
        - {$BOSCH.USER} and {$BOSCH.PASSWORD} macros set
        
        RCP+ command tags used:
          0x002e CONF_HARDWARE_VERSION  (P_STRING, READ)
          0x002f CONF_FIRMWARE_VERSION  (P_STRING, READ)
          0x0032 CONF_DEVICE_NAME       (P_UNICODE, READ)
          0x0a07 CONF_ENCODER_LOAD      (T_DWORD, READ)  — % CPU load
          0x0a36 CONF_DEVICE_UPTIME     (T_DWORD, READ)
      vendor:
        name: Community
        version: '7.4-0'
      groups:
        - name: Templates/Video

      items:

        - uuid: 5b4797c85bbe4f12aaf9be62c08c8a32
          name: 'Bosch: ICMP ping'
          type: SIMPLE
          key: 'icmpping'
          delay: 1m
          description: Basic ICMP reachability.

        - uuid: a9876970667b42ec8a6bf858dc7a7dd9
          name: 'Bosch: ICMP loss %'
          type: SIMPLE
          key: 'icmppingloss'
          delay: 1m
          units: '%'

        - uuid: e5b5bca19fb8498e8c017c3facd6e78a
          name: 'Bosch: ICMP round-trip avg'
          type: SIMPLE
          key: 'icmppingsec'
          delay: 1m
          units: s
          value_type: FLOAT

        - uuid: afa62089cb134f65aa2d2eccd5a82a55
          name: 'Bosch: Web UI reachable'
          type: SIMPLE
          key: 'net.tcp.service[https,{HOST.CONN},{$BOSCH.PORT}]'
          delay: 30s
          valuemap:
            name: 'Service state'

        # RCP+ raw responses
        - uuid: 6c99f471dcf74a688884935abff90a3d
          name: 'Bosch: RCP hardware version (raw)'
          type: HTTP_AGENT
          key: bosch.rcp.hw.raw
          delay: 10m
          history: '0'
          trends: '0'
          value_type: TEXT
          url: '{$BOSCH.SCHEME}://{HOST.CONN}:{$BOSCH.PORT}/rcp.xml'
          query_fields:
            - name: command
              value: '0x002e'
            - name: type
              value: P_STRING
            - name: direction
              value: READ
          headers:
            - name: Accept
              value: application/xml
          authtype: DIGEST
          username: '{$BOSCH.USER}'
          password: '{$BOSCH.PASSWORD}'
          verify_peer: 'NO'
          verify_host: 'NO'

        - uuid: e0d87c45aa8e4193b11dc917462fa6f9
          name: 'Bosch: Hardware version'
          type: DEPENDENT
          key: bosch.hw.version
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: bosch.rcp.hw.raw
          preprocessing:
            - type: XMLPATH
              parameters:
                - string(/rcp/r/str)

        - uuid: 565dcece46284809a4b9cb7c3c02157d
          name: 'Bosch: RCP firmware version (raw)'
          type: HTTP_AGENT
          key: bosch.rcp.fw.raw
          delay: 10m
          history: '0'
          trends: '0'
          value_type: TEXT
          url: '{$BOSCH.SCHEME}://{HOST.CONN}:{$BOSCH.PORT}/rcp.xml'
          query_fields:
            - name: command
              value: '0x002f'
            - name: type
              value: P_STRING
            - name: direction
              value: READ
          authtype: DIGEST
          username: '{$BOSCH.USER}'
          password: '{$BOSCH.PASSWORD}'
          verify_peer: 'NO'
          verify_host: 'NO'

        - uuid: 17adfc2accad4d2db75fc364644c1079
          name: 'Bosch: Firmware version'
          type: DEPENDENT
          key: bosch.fw.version
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: bosch.rcp.fw.raw
          preprocessing:
            - type: XMLPATH
              parameters:
                - string(/rcp/r/str)

        - uuid: 64892473cb444cf1adc762a7d5f154bb
          name: 'Bosch: RCP device name (raw)'
          type: HTTP_AGENT
          key: bosch.rcp.name.raw
          delay: 10m
          history: '0'
          trends: '0'
          value_type: TEXT
          url: '{$BOSCH.SCHEME}://{HOST.CONN}:{$BOSCH.PORT}/rcp.xml'
          query_fields:
            - name: command
              value: '0x0032'
            - name: type
              value: P_UNICODE
            - name: direction
              value: READ
          authtype: DIGEST
          username: '{$BOSCH.USER}'
          password: '{$BOSCH.PASSWORD}'
          verify_peer: 'NO'
          verify_host: 'NO'

        - uuid: 31d300516cd046448d8cb5c640880b6d
          name: 'Bosch: Device name'
          type: DEPENDENT
          key: bosch.device.name
          delay: '0'
          trends: '0'
          value_type: CHAR
          master_item:
            key: bosch.rcp.name.raw
          preprocessing:
            - type: XMLPATH
              parameters:
                - string(/rcp/r/str)

        - uuid: 0c9d8497d5e8406f96d3298340813e4d
          name: 'Bosch: RCP encoder load (raw)'
          type: HTTP_AGENT
          key: bosch.rcp.load.raw
          delay: 1m
          history: '0'
          trends: '0'
          value_type: TEXT
          url: '{$BOSCH.SCHEME}://{HOST.CONN}:{$BOSCH.PORT}/rcp.xml'
          query_fields:
            - name: command
              value: '0x0a07'
            - name: type
              value: T_DWORD
            - name: direction
              value: READ
          authtype: DIGEST
          username: '{$BOSCH.USER}'
          password: '{$BOSCH.PASSWORD}'
          verify_peer: 'NO'
          verify_host: 'NO'

        - uuid: 06a9631753c7402685384d78a3bb2d3b
          name: 'Bosch: Encoder load'
          type: DEPENDENT
          key: bosch.encoder.load
          delay: '0'
          units: '%'
          value_type: FLOAT
          master_item:
            key: bosch.rcp.load.raw
          preprocessing:
            - type: XMLPATH
              parameters:
                - string(/rcp/r/dec)
            - type: MATCHES_REGEX
              parameters:
                - '^[0-9]+(\.[0-9]+)?$'
              error_handler: DISCARD_VALUE

        - uuid: debb6f754a404764895c9ea89eb78dc6
          name: 'Bosch: RCP uptime (raw)'
          type: HTTP_AGENT
          key: bosch.rcp.uptime.raw
          delay: 5m
          history: '0'
          trends: '0'
          value_type: TEXT
          url: '{$BOSCH.SCHEME}://{HOST.CONN}:{$BOSCH.PORT}/rcp.xml'
          query_fields:
            - name: command
              value: '0x0a36'
            - name: type
              value: T_DWORD
            - name: direction
              value: READ
          authtype: DIGEST
          username: '{$BOSCH.USER}'
          password: '{$BOSCH.PASSWORD}'
          verify_peer: 'NO'
          verify_host: 'NO'

        - uuid: bbf8016c515845d9b6b76be7690a8490
          name: 'Bosch: Uptime'
          type: DEPENDENT
          key: bosch.uptime
          delay: '0'
          units: uptime
          value_type: FLOAT
          master_item:
            key: bosch.rcp.uptime.raw
          preprocessing:
            - type: XMLPATH
              parameters:
                - string(/rcp/r/dec)
            - type: MATCHES_REGEX
              parameters:
                - '^[0-9]+$'
              error_handler: DISCARD_VALUE

      macros:
        - macro: '{$BOSCH.USER}'
          value: 'service'
          description: Service-level user on the camera.
        - macro: '{$BOSCH.PASSWORD}'
          value: ''
          type: SECRET_TEXT
          description: Camera service password.
        - macro: '{$BOSCH.SCHEME}'
          value: 'https'
          description: http or https.
        - macro: '{$BOSCH.PORT}'
          value: '443'
          description: Web port (80 for http, 443 for https).

      valuemaps:
        - uuid: e825f072984f40cabdcc389196e65a65
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: 'Down'
            - value: '1'
              newvalue: 'Up'

      dashboards:
        - uuid: 47262de9b7bd47e68949427e4e85b64c
          name: 'Bosch camera overview'
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'Device name'
                  x: '0'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: bosch.device.name
                - type: item
                  name: 'Firmware'
                  x: '18'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: bosch.fw.version
                - type: item
                  name: 'Uptime'
                  x: '36'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: bosch.uptime
                - type: item
                  name: 'Web UI'
                  x: '54'
                  'y': '0'
                  width: '18'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: 'net.tcp.service[https,{HOST.CONN},{$BOSCH.PORT}]'
                - type: graph
                  name: 'Encoder load'
                  x: '0'
                  'y': '3'
                  width: '36'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: bosch.encoder.load
                - type: graph
                  name: 'ICMP round-trip'
                  x: '36'
                  'y': '3'
                  width: '36'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Bosch IP camera by HTTP'
                        key: icmppingsec
                - type: problems
                  name: 'Active problems'
                  x: '0'
                  'y': '8'
                  width: '72'
                  height: '5'

  triggers:

    # ---------- Bosch camera template triggers ----------
    # Placed at top level because Zabbix 7.4 does not allow a triggers:
    # block inside a template. They still belong to items on the
    # 'Bosch IP camera by HTTP' template by virtue of referencing
    # /Bosch IP camera by HTTP/<key> in their expressions.
    - uuid: 52217570f22a446b8fa61b885cd83281
      expression: 'max(/Bosch IP camera by HTTP/icmpping,#3)=0'
      name: 'Bosch [{HOST.NAME}]: unreachable (ICMP)'
      priority: HIGH

    - uuid: e3a4686835084b2a8db02ec3426b04ed
      expression: 'last(/Bosch IP camera by HTTP/net.tcp.service[https,{HOST.CONN},{$BOSCH.PORT}])=0'
      name: 'Bosch [{HOST.NAME}]: web UI down'
      priority: AVERAGE

    - uuid: 25445eed6e904bf19f1f3d942ba29019
      expression: 'avg(/Bosch IP camera by HTTP/bosch.encoder.load,5m)>85'
      name: 'Bosch [{HOST.NAME}]: encoder load high (>85% for 5m)'
      priority: WARNING

    - uuid: 2e284e52ea66471e9dcb71fee12e1fb2
      expression: 'nodata(/Bosch IP camera by HTTP/bosch.rcp.hw.raw,30m)=1'
      name: 'Bosch [{HOST.NAME}]: RCP+ not responding (30m)'
      priority: AVERAGE

    - uuid: e44f58019c4c4ccba08b782dbfb7e51c
      expression: 'change(/Bosch IP camera by HTTP/bosch.uptime)<0'
      name: 'Bosch [{HOST.NAME}]: camera rebooted'
      priority: INFO

    - uuid: fdafba65616b49c79683304e99478dea
      expression: 'last(/Bosch IP camera by HTTP/bosch.fw.version,#1)<>last(/Bosch IP camera by HTTP/bosch.fw.version,#2)'
      name: 'Bosch [{HOST.NAME}]: firmware changed'
      priority: INFO
    # ---------- Milestone ESS staleness ----------
    # The external reader returns a JSON error object if the cron-driven
    # refresh hasn't succeeded in the tolerated window. We pattern-match
    # that in a trigger at the template level.
    - uuid: c7e3d7905e82417f8d91d5ff3f815ce7
      expression: 'find(/Milestone XProtect by HTTP/milestone_ess_read.sh[],,"regexp","\"error\":\"(stale|no_snapshot)\"")=1'
      name: 'Milestone [{HOST.NAME}]: ESS snapshot stale or missing'
      priority: WARNING
      description: |
        The daily milestone_ess_refresh.sh cron has not produced a fresh
        snapshot, or it has been failing. Check the log at
        /var/log/zabbix/milestone_ess_state.log on the Zabbix server/proxy.
